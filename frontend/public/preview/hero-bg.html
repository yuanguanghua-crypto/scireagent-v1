<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Background — Subtle Dark</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #060C17; }
  canvas { display: block; width: 100%; height: 100%; }

  .overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #F1F5F9; font-family: 'Inter', system-ui, sans-serif;
    pointer-events: none;
    z-index: 2;
  }
  .overlay h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
    text-shadow: 0 2px 40px rgba(0,0,0,0.6);
  }
  .overlay h1 span { color: #5EEAD4; }
  .overlay p {
    font-size: 17px; color: rgba(255,255,255,0.5);
    max-width: 480px; text-align: center;
    line-height: 1.7;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <h1>Sci<span>Reagent</span></h1>
  <p>Knowledge graph–powered precision reagents for life science research</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ─── COLORS — matched to reference image ─── */
const PALETTE = {
  bg:        '#060C17',
  bg2:       '#0A1324',
  center:    '#0F1F3D',
  grid:      'rgba(94, 234, 212, ',
  particle:  'rgba(94, 234, 212, ',
  accent:    'rgba(56, 189, 248, ',
};

let time = 0;
let frame = 0;

/* ─── SUBTLE GRID DOTS ─── */
const dots = [];
const DOT_SPACING = 48;
const DOT_COLS = Math.ceil(W / DOT_SPACING) + 4;
const DOT_ROWS = Math.ceil(H / DOT_SPACING) + 4;

function rebuildGrid() {
  dots.length = 0;
  const cols = Math.ceil(W / DOT_SPACING) + 4;
  const rows = Math.ceil(H / DOT_SPACING) + 4;
  const offsetX = -2 * DOT_SPACING;
  const offsetY = -2 * DOT_SPACING;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      dots.push({
        x: offsetX + c * DOT_SPACING,
        y: offsetY + r * DOT_SPACING,
        phase: Math.random() * Math.PI * 2,
        speed: 0.15 + Math.random() * 0.2,
        baseAlpha: 0.02 + Math.random() * 0.03,
        size: 1 + Math.random() * 0.5,
      });
    }
  }
}
rebuildGrid();

/* ─── FLOATING PARTICLES (very few, very faint) ─── */
const floaters = [];
const FLOATER_COUNT = 40;

class Floater {
  constructor() {
    this.x = (Math.random() - 0.5) * W * 1.5;
    this.y = (Math.random() - 0.5) * H * 1.5;
    this.vx = (Math.random() - 0.5) * 0.03;
    this.vy = (Math.random() - 0.5) * 0.03;
    this.size = 1 + Math.random() * 1.5;
    this.alpha = 0.01 + Math.random() * 0.02;
    this.phase = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.vx + Math.sin(time * 0.0002 + this.phase) * 0.01;
    this.y += this.vy + Math.cos(time * 0.00025 + this.phase * 1.4) * 0.01;
    const m = 200;
    if (this.x > W/2 + m) this.x = -W/2 - m;
    if (this.x < -W/2 - m) this.x = W/2 + m;
    if (this.y > H/2 + m) this.y = -H/2 - m;
    if (this.y < -H/2 - m) this.y = H/2 + m;
  }
  draw(ctx, cx, cy) {
    ctx.beginPath();
    ctx.arc(cx + this.x, cy + this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(94, 234, 212, ${this.alpha})`;
    ctx.fill();
  }
}

function initFloaters() {
  floaters.length = 0;
  for (let i = 0; i < FLOATER_COUNT; i++) floaters.push(new Floater());
}
initFloaters();

/* ─── LOOP ─── */
function loop(timestamp) {
  time = timestamp || 0;
  frame++;
  const cx = W / 2;
  const cy = H / 2;

  // ── Base gradient ──
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.65);
  bg.addColorStop(0, '#0F1F3D');
  bg.addColorStop(0.35, '#080F20');
  bg.addColorStop(1, '#060C17');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Very subtle center glow (breathing) ──
  const breath = 0.9 + 0.1 * Math.sin(time * 0.0003);
  const glowR = Math.max(W, H) * 0.3 * breath;
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
  glow.addColorStop(0, 'rgba(13, 109, 105, 0.03)');
  glow.addColorStop(0.6, 'rgba(13, 109, 105, 0.008)');
  glow.addColorStop(1, 'rgba(13, 109, 105, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // ── Grid dots — barely visible, slowly pulsing ──
  const driftX = Math.sin(time * 0.00005) * 6;
  const driftY = Math.cos(time * 0.00004) * 6;

  for (const d of dots) {
    const pulse = 0.5 + 0.5 * Math.sin(time * 0.0005 * d.speed + d.phase);
    const a = d.baseAlpha * (0.6 + 0.4 * pulse);
    const sx = cx + d.x + driftX;
    const sy = cy + d.y + driftY;

    // Fade at edges
    const edgeX = Math.min(1, Math.abs(d.x) / (W * 0.45));
    const edgeY = Math.min(1, Math.abs(d.y) / (H * 0.45));
    if (edgeX > 1 || edgeY > 1) continue;
    const fade = (1 - edgeX) * (1 - edgeY);

    ctx.beginPath();
    ctx.arc(sx, sy, d.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(94, 234, 212, ${a * fade})`;
    ctx.fill();
  }

  // ── Horizontal gradient accent line (very faint) ──
  const lineY = H * 0.55 + Math.sin(time * 0.0001) * 4;
  const lineGrad = ctx.createLinearGradient(0, lineY, 0, lineY + 80);
  lineGrad.addColorStop(0, 'rgba(94, 234, 212, 0)');
  lineGrad.addColorStop(0.5, 'rgba(94, 234, 212, 0.008)');
  lineGrad.addColorStop(1, 'rgba(94, 234, 212, 0)');
  ctx.fillStyle = lineGrad;
  ctx.fillRect(0, lineY, W, 80);

  // ── Floating particles ──
  for (const f of floaters) {
    f.update();
    f.draw(ctx, cx, cy);
  }

  // ── Top/bottom edge fade ──
  const topFade = ctx.createLinearGradient(0, 0, 0, 60);
  topFade.addColorStop(0, 'rgba(6, 12, 23, 0.6)');
  topFade.addColorStop(1, 'rgba(6, 12, 23, 0)');
  ctx.fillStyle = topFade;
  ctx.fillRect(0, 0, W, 60);

  const botFade = ctx.createLinearGradient(0, H-60, 0, H);
  botFade.addColorStop(0, 'rgba(6, 12, 23, 0)');
  botFade.addColorStop(1, 'rgba(6, 12, 23, 0.6)');
  ctx.fillStyle = botFade;
  ctx.fillRect(0, H-60, W, 60);

  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
  resize();
  rebuildGrid();
  initFloaters();
});

loop();
</script>
</body>
</html>
