<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hexagon (molecular structure style) -->
  <g transform="translate(50, 50)">
    <!-- Hexagon outline -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
             fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linejoin="round"/>
    <!-- Inner bonds -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="-26" y1="-15" x2="26" y2="15" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="-26" y1="15" x2="26" y2="-15" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <!-- Atom dots at vertices -->
    <circle cx="0" cy="-30" r="4" fill="#0ea5e9"/>
    <circle cx="26" cy="-15" r="4" fill="#2563eb"/>
    <circle cx="26" cy="15" r="4" fill="#2563eb"/>
    <circle cx="0" cy="30" r="4" fill="#0ea5e9"/>
    <circle cx="-26" cy="15" r="4" fill="#2563eb"/>
    <circle cx="-26" cy="-15" r="4" fill="#2563eb"/>
  </g>
  <!-- Brand name -->
  <text x="100" y="58" font-family="Inter, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#1e293b">
    Sci<tspan fill="#0ea5e9">Reagent</tspan>
  </text>
  <!-- Subtle tagline -->
  <text x="100" y="78" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="3">
    CHEMICAL INTELLIGENCE
  </text>
</svg>
